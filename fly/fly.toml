app = "pbot-crawler"
primary_region = "sjc"

[env]
DEBUG = "pbotcrawl"
PORT = "3000"
DATABASE_URL = "file:///data/sqlite.db"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0
[http_service.concurrency]
type = "requests"
soft_limit = 200
hard_limit = 250

[mounts]
source = "db"
destination = "/data"
initial_size = "1gb"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
